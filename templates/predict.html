<!DOCTYPE html>
<html>
<head>

<title>Prediction Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
padding:40px;
border-radius:15px;
text-align:center;
}

</style>

</head>

<body>

<div class="card shadow">

<h2 class="mb-4">Titanic Prediction Result</h2>

{% if result == 1 %}
<h3 class="text-success">Passenger Survived ✅</h3>
{% else %}
<h3 class="text-danger">Passenger Did Not Survive ❌</h3>
{% endif %}

<br>

<a href="/" class="btn btn-primary">Predict Again</a>

</div>

</body>
</html>
